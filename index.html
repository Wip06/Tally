<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>Tally — Compteur de Points</title>
<meta name="description" content="Tally, compteur de points multi-équipes, hors-ligne, personnalisable.">
<meta name="theme-color" content="#303446">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tally">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="bg-blobs" aria-hidden="true">
  <span class="blob blob--1"></span>
  <span class="blob blob--2"></span>
  <span class="blob blob--3"></span>
</div>
<div id="confetti-layer" class="confetti-layer" aria-hidden="true"></div>
<div id="win-banner" class="win-banner" hidden></div>
<div id="app">
  <header class="app-header">
    <h1>Tally</h1>
    <p class="app-header__tagline">Le score de tes équipes, sans prise de tête.</p>
  </header>

  <main id="view-home" class="view">
    <div class="home-toolbar" hidden>
      <p id="counters-count" class="counters-count"></p>
      <button id="btn-new-counter" class="btn btn-primary">+ Nouveau compteur</button>
    </div>
    <div id="counters-grid" class="counters-grid"></div>
    <div id="empty-state" class="empty-state" hidden>
      <svg class="empty-state__art" viewBox="0 0 200 140" aria-hidden="true" focusable="false">
        <ellipse cx="100" cy="122" rx="72" ry="10" fill="#414559"/>
        <rect x="40" y="70" width="36" height="50" rx="10" fill="#8caaee"/>
        <rect x="82" y="46" width="36" height="74" rx="10" fill="#ca9ee6"/>
        <rect x="124" y="82" width="36" height="38" rx="10" fill="#85c1dc"/>
      </svg>
      <h2>Aucun compteur pour l'instant</h2>
      <p>Crée ton premier compteur.</p>
      <button id="btn-new-counter-empty" class="btn btn-primary">+ Créer mon premier compteur</button>
    </div>
  </main>

  <main id="view-detail" class="view" hidden>
    <div class="detail-header">
      <button id="btn-back" class="btn btn-ghost" aria-label="Retour à l'accueil">← Retour</button>
      <input id="counter-name-input" class="counter-name-input" type="text" aria-label="Nom du compteur">
      <button id="btn-open-settings" class="btn btn-ghost" aria-label="Réglages du compteur">⚙️</button>
      <button id="btn-delete-counter" class="btn btn-icon-danger" aria-label="Supprimer ce compteur">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M3 6h18"/>
          <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    </div>

    <div id="teams-list" class="teams-list"></div>

    <div class="detail-actions">
      <button id="btn-add-team" class="btn btn-secondary">+ Ajouter une équipe</button>
      <button id="btn-open-history" class="btn btn-ghost">Historique</button>
      <button id="btn-reset-scores" class="btn btn-ghost">↺ Réinitialiser les scores</button>
    </div>
  </main>

  <main id="view-timer" class="view" hidden>
    <div class="detail-header">
      <button id="btn-timer-back" class="btn btn-ghost" aria-label="Retour à l'accueil">← Retour</button>
      <input id="timer-name-input" class="counter-name-input" type="text" aria-label="Nom du minuteur">
      <button id="btn-timer-settings" class="btn btn-ghost" aria-label="Réglages du minuteur">⚙️</button>
      <button id="btn-timer-delete" class="btn btn-icon-danger" aria-label="Supprimer ce minuteur">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
          <path d="M3 6h18"/>
          <path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/>
          <path d="M14 11v6"/>
        </svg>
      </button>
    </div>

    <div class="timer-stage">
      <div class="timer-ring-wrap">
        <svg class="timer-ring" viewBox="0 0 200 200" aria-hidden="true" focusable="false">
          <circle class="timer-ring__track" cx="100" cy="100" r="90"/>
          <circle id="timer-ring-progress" class="timer-ring__progress" cx="100" cy="100" r="90"/>
        </svg>
        <div id="timer-big-display" class="timer-ring-label">05:00</div>
      </div>
      <div class="timer-controls">
        <button id="btn-timer-toggle" type="button" class="btn btn-primary timer-btn-toggle">Démarrer</button>
        <button id="btn-timer-reset" type="button" class="btn btn-ghost" aria-label="Réinitialiser le minuteur">↺ Réinitialiser</button>
      </div>
    </div>

    <div id="timer-teams-list" class="teams-list"></div>

    <div class="detail-actions">
      <button id="btn-timer-add-team" class="btn btn-secondary">+ Ajouter une équipe</button>
      <button id="btn-timer-reset-scores" class="btn btn-ghost">↺ Réinitialiser les scores</button>
    </div>
  </main>
</div>

<!-- Modal: nouveau compteur -->
<div id="modal-new-counter" class="modal-overlay" hidden>
  <div class="modal">
    <h2>Nouveau</h2>
    <label>Type</label>
    <div class="mode-switch" role="tablist" aria-label="Type d'élément">
      <button type="button" class="new-type-btn active" data-type="score" role="tab">Compteur de score</button>
      <button type="button" class="new-type-btn" data-type="timer" role="tab">Minuteur</button>
    </div>
    <label>Nom
      <input id="new-counter-name" type="text" placeholder="Ex : Pétanque" maxlength="60">
    </label>
    <label id="new-timer-duration-row" for="new-timer-duration-input" hidden>Durée (minutes)
      <input id="new-timer-duration-input" type="text" inputmode="numeric" placeholder="5">
    </label>
    <div class="modal-actions">
      <button id="btn-cancel-new-counter" class="btn btn-ghost">Annuler</button>
      <button id="btn-confirm-new-counter" class="btn btn-primary">Créer</button>
    </div>
  </div>
</div>

<!-- Modal: réglages du compteur -->
<div id="modal-counter-settings" class="modal-overlay" hidden>
  <div class="modal">
    <h2>Réglages du compteur</h2>
    <label>Mode de score</label>
    <div class="mode-switch" role="tablist" aria-label="Mode de score">
      <button type="button" class="mode-btn" data-mode="tap" role="tab">Clic +1</button>
      <button type="button" class="mode-btn" data-mode="manual" role="tab">Libre</button>
      <button type="button" class="mode-btn" data-mode="tennis" role="tab">Tennis-Padel</button>
    </div>
    <label for="target-score-input">Objectif de score</label>
    <input id="target-score-input" type="text" inputmode="numeric" placeholder="Aucun">
    <div class="modal-actions">
      <button id="btn-close-settings" class="btn btn-primary">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal: historique des parties -->
<div id="modal-history" class="modal-overlay" hidden>
  <div class="modal">
    <h2>Historique des parties</h2>
    <div id="history-list" class="history-list"></div>
    <div class="modal-actions">
      <button id="btn-close-history" class="btn btn-ghost">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal: réglages du minuteur -->
<div id="modal-timer-settings" class="modal-overlay" hidden>
  <div class="modal">
    <h2>Réglages du minuteur</h2>
    <label for="timer-duration-input">Durée (minutes)</label>
    <input id="timer-duration-input" type="text" inputmode="numeric" placeholder="5">
    <label>Mode de score des équipes</label>
    <div class="mode-switch" role="tablist" aria-label="Mode de score">
      <button type="button" class="mode-btn" data-mode="tap" role="tab">Clic +1</button>
      <button type="button" class="mode-btn" data-mode="manual" role="tab">Libre</button>
      <button type="button" class="mode-btn" data-mode="tennis" role="tab">Tennis-Padel</button>
    </div>
    <div class="modal-actions">
      <button id="btn-close-timer-settings" class="btn btn-primary">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal: choix de couleur -->
<div id="modal-color-picker" class="modal-overlay" hidden>
  <div class="modal">
    <h2>Couleur de l'équipe</h2>
    <div id="color-swatches" class="swatches"></div>
    <div class="custom-color-row">
      <label for="custom-color-input">Autre couleur</label>
      <input id="custom-color-input" type="color">
    </div>
    <div class="modal-actions">
      <button id="btn-close-color-picker" class="btn btn-ghost">Fermer</button>
    </div>
  </div>
</div>

<!-- Modal: confirmation -->
<div id="modal-confirm" class="modal-overlay" hidden>
  <div class="modal">
    <h2 id="confirm-title">Confirmer</h2>
    <p id="confirm-message"></p>
    <div class="modal-actions">
      <button id="btn-confirm-cancel" class="btn btn-ghost">Annuler</button>
      <button id="btn-confirm-ok" class="btn btn-danger">Confirmer</button>
    </div>
  </div>
</div>

<!-- Alerte d'annulation -->
<div id="undo-toast" class="undo-toast" hidden>
  <span id="undo-toast-message"></span>
  <button id="btn-undo" class="btn btn-secondary">Annuler</button>
</div>

<!-- Bannière d'installation PWA -->
<div id="install-banner" class="install-banner" hidden>
  <span>Installer l'application sur cet appareil</span>
  <button id="btn-install" class="btn btn-primary">Installer</button>
  <button id="btn-dismiss-install" class="btn btn-ghost" aria-label="Ignorer">✕</button>
</div>

<script src="app.js"></script>
</body>
</html>
